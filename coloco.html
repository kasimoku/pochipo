<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>coloco - カラーピッカー</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #fff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 20px 16px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #aaa;
  margin-top: 8px;
}

.preview-area {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.color-preview {
  width: 48%;
  min-height: 260px;
  border-radius: 20px;
  transition: background-color 0.05s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  flex-shrink: 0;
}

.palette {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(5, 1fr);
  gap: 5px;
}

.palette-slot {
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: transform 0.12s, border-color 0.2s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  overflow: hidden;
}

.palette-slot:active { transform: scale(0.93); }

.palette-slot .slot-label {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  pointer-events: none;
  user-select: none;
}

.palette-slot.light-bg .slot-label {
  color: rgba(0,0,0,0.55);
  text-shadow: 0 1px 3px rgba(255,255,255,0.3);
}

.palette-slot.dark-bg .slot-label {
  color: rgba(255,255,255,0.8);
}

.palette-slot.empty {
  background: rgba(255,255,255,0.04);
  border-style: dashed;
}

.palette-slot.empty::after {
  content: '+';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: rgba(255,255,255,0.2);
  font-weight: 600;
}

.palette-slot.active {
  border-color: #fff;
  box-shadow: 0 0 0 1px #fff;
}

.hex-display {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.hex-code {
  font-size: 32px;
  font-weight: 700;
  font-family: 'SF Mono', 'Fira Code', monospace;
  letter-spacing: 2px;
  text-align: center;
  user-select: all;
}

.action-btn {
  background: rgba(255,255,255,0.12);
  border: none;
  color: #fff;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}

.action-btn:active { transform: scale(0.92); }
.action-btn:hover { background: rgba(255,255,255,0.2); }
.action-btn.copied { background: rgba(76, 175, 80, 0.3); }

.rgb-display {
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: #666;
}

.sliders {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.slider-group { width: 100%; }

.slider-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #888;
}

.slider-value {
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: #ccc;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 44px;
  border-radius: 12px;
  outline: none;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.08);
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(0,0,0,0.1);
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(0,0,0,0.1);
  cursor: pointer;
  border: none;
}

#hue {
  background: linear-gradient(to right,
    hsl(0,100%,50%), hsl(30,100%,50%), hsl(60,100%,50%),
    hsl(90,100%,50%), hsl(120,100%,50%), hsl(150,100%,50%),
    hsl(180,100%,50%), hsl(210,100%,50%), hsl(240,100%,50%),
    hsl(270,100%,50%), hsl(300,100%,50%), hsl(330,100%,50%),
    hsl(360,100%,50%)
  );
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(76, 175, 80, 0.95);
  color: #fff;
  padding: 12px 28px;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  z-index: 100;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="app">
  <h1>coloco</h1>

  <div class="preview-area">
    <div class="color-preview" id="preview"></div>
    <div class="palette" id="palette"></div>
  </div>

  <div class="hex-display">
    <span class="hex-code" id="hexCode">#FF0000</span>
    <button class="action-btn" id="copyBtn" title="コピー">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
    <button class="action-btn" id="saveBtn" title="パレットに保存">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
  </div>

  <div class="rgb-display">
    <span id="rgbR">R 255</span>
    <span id="rgbG">G 0</span>
    <span id="rgbB">B 0</span>
  </div>

  <div class="sliders">
    <div class="slider-group">
      <div class="slider-label">
        <span>色相 / Hue</span>
        <span class="slider-value" id="hueVal">0°</span>
      </div>
      <input type="range" id="hue" min="0" max="360" value="0">
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>彩度 / Saturation</span>
        <span class="slider-value" id="satVal">100%</span>
      </div>
      <input type="range" id="saturation" min="0" max="100" value="100">
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>明度 / Brightness</span>
        <span class="slider-value" id="brtVal">50%</span>
      </div>
      <input type="range" id="brightness" min="0" max="100" value="50">
    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました ✓</div>

<script>
const SLOTS = 10;
const hueSlider = document.getElementById('hue');
const satSlider = document.getElementById('saturation');
const brtSlider = document.getElementById('brightness');
const preview = document.getElementById('preview');
const hexCode = document.getElementById('hexCode');
const copyBtn = document.getElementById('copyBtn');
const saveBtn = document.getElementById('saveBtn');
const toast = document.getElementById('toast');
const hueVal = document.getElementById('hueVal');
const satVal = document.getElementById('satVal');
const brtVal = document.getElementById('brtVal');
const rgbR = document.getElementById('rgbR');
const rgbG = document.getElementById('rgbG');
const rgbB = document.getElementById('rgbB');
const paletteEl = document.getElementById('palette');

let palette = JSON.parse(localStorage.getItem('coloco-palette') || '[]');

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0').toUpperCase()).join('');
}

function updateColor() {
  const h = parseInt(hueSlider.value);
  const s = parseInt(satSlider.value);
  const l = parseInt(brtSlider.value);
  const [r, g, b] = hslToRgb(h, s, l);
  const hex = rgbToHex(r, g, b);

  preview.style.backgroundColor = hex;
  hexCode.textContent = hex;
  hueVal.textContent = h + '°';
  satVal.textContent = s + '%';
  brtVal.textContent = l + '%';
  rgbR.textContent = 'R ' + r;
  rgbG.textContent = 'G ' + g;
  rgbB.textContent = 'B ' + b;
  updateSliderBackgrounds(h, s, l);
}

function updateSliderBackgrounds(h, s, l) {
  const satStops = [];
  for (let i = 0; i <= 100; i += 10) {
    const [r, g, b] = hslToRgb(h, i, l);
    satStops.push(`rgb(${r},${g},${b})`);
  }
  satSlider.style.background = `linear-gradient(to right, ${satStops.join(',')})`;

  const brtStops = [];
  for (let i = 0; i <= 100; i += 10) {
    const [r, g, b] = hslToRgb(h, s, i);
    brtStops.push(`rgb(${r},${g},${b})`);
  }
  brtSlider.style.background = `linear-gradient(to right, ${brtStops.join(',')})`;
}

function savePalette() {
  localStorage.setItem('coloco-palette', JSON.stringify(palette));
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 140;
}

function renderPalette() {
  paletteEl.innerHTML = '';
  for (let i = 0; i < SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'palette-slot' + (palette[i] ? '' : ' empty');
    if (palette[i]) {
      slot.style.backgroundColor = palette[i];
      slot.title = palette[i];
      slot.classList.add(isLightColor(palette[i]) ? 'light-bg' : 'dark-bg');
      const label = document.createElement('span');
      label.className = 'slot-label';
      label.textContent = palette[i];
      slot.appendChild(label);
      slot.addEventListener('click', () => loadFromPalette(i));
      slot.addEventListener('contextmenu', (e) => { e.preventDefault(); removeFromPalette(i); });
    } else {
      slot.addEventListener('click', () => addToPalette(i));
    }
    paletteEl.appendChild(slot);
  }
}

function addToPalette(index) {
  palette[index] = hexCode.textContent;
  savePalette();
  renderPalette();
  showToastMsg('保存しました ✓');
}

function removeFromPalette(index) {
  palette.splice(index, 1);
  savePalette();
  renderPalette();
  showToastMsg('削除しました');
}

function loadFromPalette(index) {
  const hex = palette[index];
  if (!hex) return;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const [h, s, l] = rgbToHsl(r, g, b);
  hueSlider.value = h;
  satSlider.value = s;
  brtSlider.value = l;
  updateColor();
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

let toastTimer;
function showToastMsg(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

saveBtn.addEventListener('click', () => {
  const emptyIndex = palette.findIndex((c, i) => !c);
  const index = emptyIndex !== -1 ? emptyIndex : (palette.length < SLOTS ? palette.length : -1);
  if (index === -1) {
    palette.pop();
    palette.unshift(hexCode.textContent);
  } else {
    palette[index] = hexCode.textContent;
  }
  savePalette();
  renderPalette();
  showToastMsg('保存しました ✓');
});

copyBtn.addEventListener('click', async () => {
  const hex = hexCode.textContent;
  try {
    await navigator.clipboard.writeText(hex);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = hex;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  copyBtn.classList.add('copied');
  setTimeout(() => copyBtn.classList.remove('copied'), 600);
  showToastMsg('コピーしました ✓');
});

hueSlider.addEventListener('input', updateColor);
satSlider.addEventListener('input', updateColor);
brtSlider.addEventListener('input', updateColor);

updateColor();
renderPalette();
</script>
</body>
</html>
